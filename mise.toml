[tools]
dprint = "latest"
node = "lts"
rust = { version = "1.92", components = "rustfmt,clippy", targets = "aarch64-unknown-linux-gnu,x86_64-unknown-linux-gnu" }
yamlfmt = "latest"
cargo-binstall = "latest"
"cargo:sqlx-cli" = "latest"
"cargo:cross" = "latest"

[tasks."build:rs"]
run = "cargo build"

[tasks."build:rs:release"]
run = "cargo build --release"

[tasks."build:ts"]
run = "npm run build"
dir = "sdk/ts"
depends = ["generate:types"]

[tasks."check:rs"]
run = "cargo clippy --workspace --exclude beyond-auth-extension -- -D warnings"

[tasks."check:ts"]
run = "npm run typecheck"
dir = "sdk/ts"
depends = ["generate:types"]

[tasks."check:fmt"]
run = "dprint check"
depends = ["generate:types"]

[tasks."format"]
run = "dprint fmt"

[tasks."install:ts"]
run = "npm ci"
dir = "sdk/ts"

[tasks."migrate"]
run = "cargo sqlx migrate run"

[tasks."sqlx:prepare"]
run = "cargo run --package xtask"

[tasks."test:unit:rs"]
run = "cargo test --lib"

[tasks."test:integration:rs"]
run = "cargo test --test api --features test-server"

# Handoff integration tests spawn the real `beyond-auth` binary (and the
# `handoff-test-supervisor` bin) as subprocesses, drive the handoff
# protocol against them, and verify zero-downtime behavior end-to-end.
# Test-threads=1 because each scenario binds an ephemeral port, creates a
# fresh postgres database, and spawns process trees — running them in
# parallel saturates the runner's docker/postgres connection budget.
[tasks."test:integration:rs:handoff"]
run = "cargo test --test handoff --features test-server -- --test-threads=1"

# `sqlx prepare --check`: verify the committed `.sqlx/` query cache matches
# the queries in the code. Catches contributors changing a query macro
# without re-running `mise run sqlx:prepare`. Cheap; runs against the live
# CI postgres (no testcontainer needed).
[tasks."check:sqlx"]
run = "cargo sqlx prepare --check --workspace -- --tests --features test-server"

[tasks."test:integration:ts"]
run = "npm test"
dir = "sdk/ts"
depends = ["generate:types", "build:rs", "test:integration:rs"]

[tasks."generate:openapi"]
run = "cargo run -- generate-openapi"

[tasks."generate:types"]
run = [
  "cd ts && node scripts/generate-types.mjs",
  "cd ts && node scripts/generate-react-types.mjs",
  "cd .. && dprint fmt openapi/v1.json sdk/ts/src/types.ts sdk/ts/src/react/types.ts",
]
dir = "sdk"
depends = ["install:ts", "generate:openapi"]

[tasks."bench"]
run = "cargo run --release --package bench -- run-all"

[tasks."bench:quick"]
run = "cargo run --release -p bench -- run-all --profile quick"

[tasks."bench:full"]
run = "cargo run --release -p bench -- run-all --profile full"

[tasks."bench:cold"]
run = "cargo run --release -p bench -- run-all --profile quick --shared-buffers 32MB --output bench/out/report_cold.md"

# Build the beyond-auth-extension shared library for the local OS (host PostgreSQL must be installed).
# Used by developers on Linux or when the host PG matches the target container.
[tasks."extension:build"]
run = "PGRX_PG_CONFIG_PATH=/opt/homebrew/opt/postgresql@17/bin/pg_config RUSTFLAGS='-C link-arg=-undefined -C link-arg=dynamic_lookup' cargo build --release -p beyond-auth-extension --features pg17"

# Build the beyond-auth-extension .so for linux/arm64 (postgres:18 on Apple Silicon).
# Runs inside the postgres:18 Docker image (has pg_config + dev headers) to produce a native ARM64 ELF.
# Output: target/aarch64-unknown-linux-gnu/release/libbeyond_auth_extension.so
# Required before running `mise run bench` or `mise run sqlx:prepare` with extension enabled.
[tasks."extension:build:linux:arm64"]
run = """
docker run --rm --platform linux/arm64 \
  -v "$(pwd)":/src \
  -e DEBIAN_FRONTEND=noninteractive \
  postgres:18 /bin/sh -c '
    apt-get update -qq 2>/dev/null &&
    apt-get install -y -qq curl pkg-config libssl-dev build-essential libclang-dev clang postgresql-server-dev-18 2>/dev/null &&
    curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92 --profile minimal --quiet 2>&1 | tail -2 &&
    . "$HOME/.cargo/env" &&
    PGRX_PG_CONFIG_PATH=/usr/bin/pg_config cargo build --release --no-default-features --features pg18 -p beyond-auth-extension --manifest-path /src/beyond-auth-extension/Cargo.toml --target-dir /src/target 2>&1 &&
    mkdir -p /src/target/aarch64-unknown-linux-gnu/release &&
    cp /src/target/release/libbeyond_auth_extension.so /src/target/aarch64-unknown-linux-gnu/release/libbeyond_auth_extension.so &&
    echo "Built: /src/target/aarch64-unknown-linux-gnu/release/libbeyond_auth_extension.so"
  '
"""

# Build the beyond-auth-extension .so for linux/amd64 (postgres:18 on Intel).
# Same shape as the arm64 task: docker-direct against postgres:18 so apt sources
# stay fresh. `cross` was used here previously, but its x86_64-gnu base image is
# Ubuntu Focal, which dropped off the pgdg apt repo, breaking the build on every
# clean checkout.
# Output: target/x86_64-unknown-linux-gnu/release/libbeyond_auth_extension.so
[tasks."extension:build:linux:amd64"]
run = """
docker run --rm --platform linux/amd64 \
  -v "$(pwd)":/src \
  -e DEBIAN_FRONTEND=noninteractive \
  postgres:18 /bin/sh -c '
    apt-get update -qq 2>/dev/null &&
    apt-get install -y -qq curl pkg-config libssl-dev build-essential libclang-dev clang postgresql-server-dev-18 2>/dev/null &&
    curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.92 --profile minimal --quiet 2>&1 | tail -2 &&
    . "$HOME/.cargo/env" &&
    PGRX_PG_CONFIG_PATH=/usr/bin/pg_config cargo build --release --no-default-features --features pg18 -p beyond-auth-extension --manifest-path /src/beyond-auth-extension/Cargo.toml --target-dir /src/target 2>&1 &&
    mkdir -p /src/target/x86_64-unknown-linux-gnu/release &&
    cp /src/target/release/libbeyond_auth_extension.so /src/target/x86_64-unknown-linux-gnu/release/libbeyond_auth_extension.so &&
    echo "Built: /src/target/x86_64-unknown-linux-gnu/release/libbeyond_auth_extension.so"
  '
"""

# Save a baseline bench report (no extension) and a treatment report (with extension), then diff.
[tasks."bench:compare"]
run = """
mise run bench -- run-all --output bench/out/baseline.json && \
mise run extension:build:linux:arm64 && \
mise run bench -- run-all --output bench/out/treatment.json && \
cargo run --release -p bench -- compare bench/out/baseline.json bench/out/treatment.json
"""
