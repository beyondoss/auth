[tools]
dprint = "latest"
node = "lts"
rust = { version = "1.92", components = "rustfmt,clippy" }
yamlfmt = "latest"
cargo-binstall = "latest"
"cargo:sqlx-cli" = "latest"

[tasks."format"]
run = "dprint fmt"

[tasks."sqlx:prepare"]
run = "cargo run --package xtask"

[tasks."bench"]
run = "cargo run --release --package bench -- run-all"

[tasks."bench:quick"]
run = "cargo run --release -p bench -- run-all --profile quick"

[tasks."bench:full"]
run = "cargo run --release -p bench -- run-all --profile full"

[tasks."bench:cold"]
run = "cargo run --release -p bench -- run-all --profile quick --shared-buffers 32MB --output bench/out/report_cold.md"

[tasks."openapi:generate"]
run = "cargo run -- generate-openapi"

[tasks."sdk:generate-types"]
run = ["cd ts && node scripts/generate-types.mjs"]
dir = "sdk"
depends = ["openapi:generate"]
