name: Release Server
on:
  push:
    tags: ["server/v*"]
env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
permissions:
  contents: write
jobs:
  build-binary:
    strategy:
      matrix:
        include:
          # `zigtarget` pins the linked glibc to 2.39 (the floor on the minimal
          # noble VM the binary runs on); cargo-zigbuild still writes its output
          # to the BASE `target` dir, not the `.2.39`-suffixed one.
          - os: ubuntu-latest
            arch: amd64
            target: x86_64-unknown-linux-gnu
            zigtarget: x86_64-unknown-linux-gnu.2.39
          - os: ubuntu-24.04-arm
            arch: arm64
            target: aarch64-unknown-linux-gnu
            zigtarget: aarch64-unknown-linux-gnu.2.39
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - name: build
        # vendored-openssl statically links openssl so the binary needs no system
        # libssl/libcrypto (absent on the minimal noble VM); zigbuild pins glibc.
        run: cargo zigbuild --release --target ${{ matrix.zigtarget }} --features vendored-openssl --bin beyond-auth
      - name: package
        run: |
          VERSION=${GITHUB_REF_NAME#server/v}
          tar -czf beyond-auth-v${VERSION}-linux-${{ matrix.arch }}.tar.gz \
            -C target/${{ matrix.target }}/release beyond-auth
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.arch }}
          path: beyond-auth-*.tar.gz
  build-extension:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
            pg: 17
          - os: ubuntu-latest
            arch: amd64
            pg: 18
          - os: ubuntu-24.04-arm
            arch: arm64
            pg: 17
          - os: ubuntu-24.04-arm
            arch: arm64
            pg: 18
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - name: install postgres dev headers
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gnupg2 lsb-release libclang-dev clang curl
          # Retry the key fetch — a transient empty response makes gpg fail with
          # "no valid OpenPGP data found".
          curl -fsSL --retry 5 --retry-all-errors \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-${{ matrix.pg }}
      - name: install cargo-pgrx
        run: cargo install cargo-pgrx --version "=0.18.0" --locked
      - name: build and package extension
        run: |
          VERSION=${GITHUB_REF_NAME#server/v}
          PG_CONFIG=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
          # Point pgrx at the system pg_config directly — no PGRX_HOME / init
          # needed (mirrors the postgres repo's build-beyond-extensions.sh).
          PGRX_PG_CONFIG_PATH="${PG_CONFIG}" cargo pgrx package \
            --pg-config "${PG_CONFIG}" \
            --no-default-features --features pg${{ matrix.pg }} \
            -p beyond-auth-extension
          # pgrx names the package dir after the lib (`beyond_auth`), not the cargo
          # package (`beyond-auth-extension`). Asset name keeps the
          # `beyond-auth-extension` prefix that 04-beyond-extensions.sh expects.
          tar -czf beyond-auth-extension-v${VERSION}-pg${{ matrix.pg }}-linux-${{ matrix.arch }}.tar.gz \
            -C target/release/beyond_auth-pg${{ matrix.pg }} .
      - uses: actions/upload-artifact@v7
        with:
          name: extension-pg${{ matrix.pg }}-${{ matrix.arch }}
          path: beyond-auth-extension-*.tar.gz
  release:
    needs: [build-binary, build-extension]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Single glob: beyond-auth-*.tar.gz already matches both the binary and
          # beyond-auth-extension-* tarballs. Listing both globs double-uploads the
          # extension assets and fails with HTTP 422.
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            beyond-auth-*.tar.gz
